name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # يسمح لك بتشغيل هذا الإجراء يدوياً من تبويب Actions
  workflow_dispatch:

# إعداد الصلاحيات للتوكن الخاص بـ GitHub للسماح بنشر الصفحات
permissions:
  contents: read
  pages: write
  id-token: write

# منع التداخل وتخطي البناء إذا تم الدفع بشكل متكرر وسريع لنفس الفرع
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # بناء المشروع
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Docusaurus Website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  # نشر المشروع
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
